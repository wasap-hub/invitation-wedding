<section class="rsvp-section">

    <div class="container">

        <div class="section-title">

            <small>Reservation</small>

            <h2>RSVP</h2>

            <p>
                Mohon konfirmasi kehadiran Anda.
            </p>

        </div>

        <form id="rsvpForm" class="rsvp-form">

            <div class="mb-3">

                <label class="form-label">

                    Nama

                </label>

                <input
                    type="text"
                    id="guest"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Jumlah Tamu

                </label>

                <select
                    id="guestCount"
                    class="form-select">

                    <option value="1">1 Orang</option>
                    <option value="2">2 Orang</option>
                    <option value="3">3 Orang</option>
                    <option value="4">4 Orang</option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Kehadiran

                </label>

                <select
                    id="attendance"
                    class="form-select">

                    <option value="Hadir">
                        Hadir
                    </option>

                    <option value="Tidak Hadir">
                        Tidak Hadir
                    </option>

                </select>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Ucapan

                </label>

                <textarea
                    id="message"
                    class="form-control"
                    rows="5"></textarea>

            </div>

            <button
                type="submit"
                class="btn-rsvp">

                Kirim RSVP

            </button>

        </form>

    </div>

</section>
