<section class="wishes-section">

    <div class="container">

        <div class="section-title">

            <small>Wedding Wishes</small>

            <h2>Ucapan & Doa</h2>

            <p>
                Berikan doa dan ucapan terbaik untuk kedua mempelai.
            </p>

        </div>

        <div class="wish-form">

            <div class="mb-3">

                <input
                    type="text"
                    id="wishName"
                    class="form-control"
                    placeholder="Nama Anda">

            </div>

            <div class="mb-3">

                <textarea
                    id="wishMessage"
                    rows="5"
                    class="form-control"
                    placeholder="Tulis ucapan dan doa..."></textarea>

            </div>

            <button
                id="btnWish"
                class="btn-send-wish">

                Kirim Ucapan

            </button>

        </div>

        <div
            id="wishList"
            class="wish-list">

        </div>

    </div>

</section>
